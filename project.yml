name: BigBrother
options:
  bundleIdPrefix: fr.bigbrother
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  groupSortPosition: top

schemes:
  BigBrother:
    build:
      targets:
        BigBrother: all
        BigBrotherMonitor: all
        BigBrotherShield: all
        BigBrotherShieldAction: all
    run:
      config: Debug
      executable: BigBrother

packages:
  BigBrotherCore:
    path: BigBrotherCore

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: Y2G5FUN342
    CODE_SIGN_STYLE: Automatic

targets:

  # ============================================================
  # Main App Target
  # ============================================================
  BigBrother:
    type: application
    platform: iOS
    sources:
      - path: BigBrotherApp
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
    dependencies:
      - package: BigBrotherCore
      - target: BigBrotherMonitor
      - target: BigBrotherShield
      - target: BigBrotherShieldAction
      - sdk: FamilyControls.framework
      - sdk: ManagedSettings.framework
      - sdk: DeviceActivity.framework
      - sdk: CloudKit.framework
      - sdk: LocalAuthentication.framework
      - sdk: Combine.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app
        CODE_SIGN_ENTITLEMENTS: BigBrotherApp/BigBrother.entitlements
        PRODUCT_NAME: BigBrother
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    info:
      path: BigBrotherApp/Info.plist
      properties:
        CFBundleDisplayName: BigBrother
        NSFaceIDUsageDescription: "Big Brother uses Face ID to protect parent settings."
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UILaunchScreen: {}
    entitlements:
      path: BigBrotherApp/BigBrother.entitlements
      properties:
        aps-environment: development
        com.apple.developer.family-controls: true
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.fr.bigbrother.app"
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)fr.bigbrother.app"
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Push:
          enabled: 1
        com.apple.iCloud:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.BackgroundModes:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # DeviceActivityMonitor Extension
  # ============================================================
  BigBrotherMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherMonitor
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: ManagedSettings.framework
      - sdk: DeviceActivity.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.monitor
        CODE_SIGN_ENTITLEMENTS: BigBrotherMonitor/BigBrotherMonitor.entitlements
        PRODUCT_NAME: BigBrotherMonitor
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    info:
      path: BigBrotherMonitor/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherMonitor
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivitymonitor
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).BigBrotherMonitorExtension"
    entitlements:
      path: BigBrotherMonitor/BigBrotherMonitor.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # ShieldConfiguration Extension
  # ============================================================
  BigBrotherShield:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherShield
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: ManagedSettings.framework
      - sdk: ManagedSettingsUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.shield
        CODE_SIGN_ENTITLEMENTS: BigBrotherShield/BigBrotherShield.entitlements
        PRODUCT_NAME: BigBrotherShield
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    info:
      path: BigBrotherShield/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherShield
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettings.ShieldConfigurationExtension
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).BigBrotherShieldExtension"
    entitlements:
      path: BigBrotherShield/BigBrotherShield.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # ShieldAction Extension
  # ============================================================
  BigBrotherShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherShieldAction
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: ManagedSettings.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.shield-action
        CODE_SIGN_ENTITLEMENTS: BigBrotherShieldAction/BigBrotherShieldAction.entitlements
        PRODUCT_NAME: BigBrotherShieldAction
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    info:
      path: BigBrotherShieldAction/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherShieldAction
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettings.ShieldActionExtension
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).BigBrotherShieldActionExtension"
    entitlements:
      path: BigBrotherShieldAction/BigBrotherShieldAction.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1
