name: BigBrother
settings:
  base:
    CURRENT_PROJECT_VERSION: "385"
    MARKETING_VERSION: "1.0.0"
options:
  bundleIdPrefix: fr.bigbrother
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  groupSortPosition: top

schemes:
  BigBrother:
    build:
      targets:
        BigBrother: all
        BigBrotherMonitor: all
        BigBrotherShield: all
        BigBrotherShieldAction: all
        BigBrotherActivityReport: all
        BigBrotherWidget: all
        BigBrotherTunnel: all
    run:
      config: Debug
      executable: BigBrother
      storeKitConfiguration: BigBrotherStore.storekit

packages:
  BigBrotherCore:
    path: BigBrotherCore
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: "11.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: Y2G5FUN342
    CODE_SIGN_STYLE: Automatic

targets:

  # ============================================================
  # Main App Target
  # ============================================================
  BigBrother:
    type: application
    platform: iOS
    sources:
      - path: BigBrotherApp
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: BigBrotherApp/GoogleService-Info.plist
        type: file
        buildPhase: resources
    dependencies:
      - package: BigBrotherCore
      - target: BigBrotherMonitor
      - target: BigBrotherShield
      - target: BigBrotherShieldAction
      - target: BigBrotherActivityReport
      - target: BigBrotherWidget
      - target: BigBrotherTunnel
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - sdk: FamilyControls.framework
        weak: true
      - sdk: ManagedSettings.framework
        weak: true
      - sdk: DeviceActivity.framework
        weak: true
      - sdk: CloudKit.framework
      - sdk: LocalAuthentication.framework
      - sdk: CoreLocation.framework
      - sdk: MapKit.framework
      - sdk: NetworkExtension.framework
      - sdk: CoreMotion.framework
      - sdk: Combine.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app
        CODE_SIGN_ENTITLEMENTS: BigBrotherApp/BigBrother.entitlements
        PRODUCT_NAME: BigBrother
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    info:
      path: BigBrotherApp/Info.plist
      properties:
        CFBundleDisplayName: BigBrother
        NSFaceIDUsageDescription: "Big Brother uses Face ID to protect parent settings."
        NSMotionUsageDescription: "Big Brother uses motion data to detect when you're traveling for accurate trip tracking."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Big Brother uses your location to help your parents know where you are and that you're safe."
        NSLocationWhenInUseUsageDescription: "Big Brother uses your location to help your parents know where you are."
        BGTaskSchedulerPermittedIdentifiers:
          - fr.bigbrother.app.heartbeat-refresh
          - fr.bigbrother.app.relock
        UIBackgroundModes:
          - fetch
          - remote-notification
          - processing
          - location
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - bigbrother
            CFBundleURLName: fr.bigbrother.app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UILaunchScreen: {}
    entitlements:
      path: BigBrotherApp/BigBrother.entitlements
      properties:
        aps-environment: development
        com.apple.developer.family-controls: true
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.fr.bigbrother.app"
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)fr.bigbrother.app"
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Push:
          enabled: 1
        com.apple.NetworkExtension:
          enabled: 1
        com.apple.iCloud:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.BackgroundModes:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # DeviceActivityMonitor Extension
  # ============================================================
  BigBrotherMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherMonitor
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: FamilyControls.framework
      - sdk: ManagedSettings.framework
      - sdk: DeviceActivity.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.monitor
        CODE_SIGN_ENTITLEMENTS: BigBrotherMonitor/BigBrotherMonitor.entitlements
        PRODUCT_NAME: BigBrotherMonitor
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        MERGED_BINARY_TYPE: none
    info:
      path: BigBrotherMonitor/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherMonitor
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor-extension
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).BigBrotherMonitorExtension"
    entitlements:
      path: BigBrotherMonitor/BigBrotherMonitor.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # ShieldConfiguration Extension
  # ============================================================
  BigBrotherShield:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherShield
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: ManagedSettings.framework
      - sdk: ManagedSettingsUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.shield
        CODE_SIGN_ENTITLEMENTS: BigBrotherShield/BigBrotherShield.entitlements
        PRODUCT_NAME: BigBrotherShield
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        MERGED_BINARY_TYPE: none
    info:
      path: BigBrotherShield/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherShield
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).BigBrotherShieldExtension"
    entitlements:
      path: BigBrotherShield/BigBrotherShield.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # DeviceActivityReport Extension (token → name resolution)
  # ============================================================
  BigBrotherActivityReport:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherActivityReport
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: DeviceActivity.framework
      - sdk: ManagedSettings.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.activity-report
        CODE_SIGN_ENTITLEMENTS: BigBrotherActivityReport/BigBrotherActivityReport.entitlements
        PRODUCT_NAME: BigBrotherActivityReport
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        MERGED_BINARY_TYPE: none
    info:
      path: BigBrotherActivityReport/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherActivityReport
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivityui.report-extension
    entitlements:
      path: BigBrotherActivityReport/BigBrotherActivityReport.entitlements
      properties:
