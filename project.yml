          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # Widget Extension (child device status widget)
  # ============================================================
  BigBrotherWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherWidget
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
    dependencies:
      - package: BigBrotherCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.widget
        CODE_SIGN_ENTITLEMENTS: BigBrotherWidget/BigBrotherWidget.entitlements
        PRODUCT_NAME: BigBrotherWidget
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        MERGED_BINARY_TYPE: none
    info:
      path: BigBrotherWidget/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: BigBrotherWidget/BigBrotherWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1

  # ============================================================
  # ShieldAction Extension
  # ============================================================
  BigBrotherShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherShieldAction
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: ManagedSettings.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.shield-action
        CODE_SIGN_ENTITLEMENTS: BigBrotherShieldAction/BigBrotherShieldAction.entitlements
        PRODUCT_NAME: BigBrotherShieldAction
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        MERGED_BINARY_TYPE: none
    info:
      path: BigBrotherShieldAction/Info.plist
      properties:
        CFBundleDisplayName: BigBrotherShieldAction
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettings.shield-action-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).BigBrotherShieldActionExtension"
    entitlements:
      path: BigBrotherShieldAction/BigBrotherShieldAction.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.FamilyControls:
          enabled: 1

  # ============================================================
  # VPN Packet Tunnel Extension
  # ============================================================
  BigBrotherTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: BigBrotherTunnel
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: BigBrotherCore
      - sdk: NetworkExtension.framework
      - sdk: CloudKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.bigbrother.app.tunnel
        CODE_SIGN_ENTITLEMENTS: BigBrotherTunnel/BigBrotherTunnel.entitlements
        PRODUCT_NAME: BigBrotherTunnel
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        MERGED_BINARY_TYPE: none
    info:
