      properties:
        CFBundleDisplayName: BigBrotherTunnel
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PacketTunnelProvider"
    entitlements:
      path: BigBrotherTunnel/BigBrotherTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.fr.bigbrother.app"
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - "group.fr.bigbrother.shared"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)fr.bigbrother.shared"
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Keychain:
          enabled: 1
        com.apple.NetworkExtension:
          enabled: 1
        com.apple.iCloud:
          enabled: 1
